name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # OIDC for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Node 24 ships npm v11. npm Trusted Publishing requires npm >= 11.5.1;
      # Node 22 ships npm 10 which fails with a misleading "404 Not Found"
      # on PUT immediately after provenance is signed.
      # Ref: https://medium.com/@kenricktan11/npm-trusted-publishers-the-weird-404-error-and-the-node-js-24-fix-a9f1d717a5dd
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run attw

      - name: Select dist-tag from version
        id: disttag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: npm publish --provenance --access public --tag "${{ steps.disttag.outputs.tag }}"
